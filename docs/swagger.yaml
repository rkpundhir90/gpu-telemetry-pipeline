basePath: /
definitions:
  gpu-telemetry-pipeline_internal_store.GPU:
    properties:
      hostname:
        type: string
      last_seen:
        type: string
      model_name:
        type: string
      uuid:
        type: string
    type: object
  gpu-telemetry-pipeline_internal_telemetry.Record:
    properties:
      container:
        description: |-
          Container/Pod/Namespace are the Kubernetes attribution fields. They are
          frequently empty in the source data, hence omitempty.
        type: string
      device:
        description: Device is the Linux device name, e.g. "nvidia0".
        type: string
      gpu_id:
        description: |-
          GPUID is the per-host ordinal GPU index ("0", "1", ...). It is only unique
          within a host; use UUID to identify a GPU globally.
        type: string
      hostname:
        description: Hostname is the host that reported the metric.
        type: string
      labels:
        additionalProperties:
          type: string
        description: |-
          Labels holds the parsed key/value pairs from the DCGM "labels_raw" column.
          Optional; preserved for richer querying without bloating the core schema.
        type: object
      metric_name:
        description: MetricName is the DCGM field, e.g. "DCGM_FI_DEV_GPU_UTIL".
        type: string
      model_name:
        description: ModelName is the GPU model, e.g. "NVIDIA H100 80GB HBM3".
        type: string
      namespace:
        type: string
      pod:
        type: string
      timestamp:
        description: |-
          Timestamp is the processing/stream time of the datapoint (RFC3339 on the
          wire). It is the time axis the API orders and filters by.
        type: string
      uuid:
        description: |-
          UUID is the globally-unique GPU identifier (GPU-xxxx...). This is the
          partition key on the queue and the primary lookup key in the API.
        type: string
      value:
        description: Value is the numeric metric reading.
        type: number
    type: object
  internal_api.ErrorResponse:
    properties:
      error:
        type: string
    type: object
info:
  contact: {}
  description: REST API exposing GPU telemetry collected from an elastic streaming
    pipeline.
  title: GPU Telemetry Pipeline API
  version: "1.0"
paths:
  /api/v1/gpus:
    get:
      description: Returns every GPU for which telemetry data has been collected.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/gpu-telemetry-pipeline_internal_store.GPU'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: List all GPUs
      tags:
      - gpus
  /api/v1/gpus/{id}/telemetry:
    get:
      description: Returns telemetry for a specific GPU ordered by time (newest first),
        with optional inclusive time-window filters.
      parameters:
      - description: GPU UUID
        in: path
        name: id
        required: true
        type: string
      - description: Inclusive lower bound (RFC3339, e.g. 2025-07-18T20:42:34Z)
        in: query
        name: start_time
        type: string
      - description: Inclusive upper bound (RFC3339)
        in: query
        name: end_time
        type: string
      - description: Max rows to return (default 1000, max 10000)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/gpu-telemetry-pipeline_internal_telemetry.Record'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Query telemetry by GPU
      tags:
      - telemetry
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - system
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      summary: Readiness probe (checks datastore connectivity)
      tags:
      - system
swagger: "2.0"
