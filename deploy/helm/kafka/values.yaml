# Single-node Kafka broker using confluentinc/cp-kafka
replicaCount: 1
zookeeper:
  enabled: false  # Disable ZooKeeper - use KRaft mode
auth:
  enabled: false

# Allow non-Bitnami images
global:
  security:
    allowInsecureImages: true

# Use Confluent Kafka image (more reliable than apache/kafka for Bitnami chart)
image:
  repository: confluentinc/cp-kafka
  tag: "7.6.0"

# Single node, minimal setup
broker:
  replicaCount: 1
  persistence:
    enabled: true
    size: 5Gi

# Enable persistence with local storage for minikube
persistence:
  enabled: true
  size: 5Gi
  storageClass: "standard"

# Minimal resources for single node
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Kraft mode configuration for single node
kraft:
  enabled: true
