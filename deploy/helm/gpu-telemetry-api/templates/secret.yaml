{{- /*
Create a Secret holding the Postgres DSN only when the user has not supplied an
existing one. Keeping the DSN in a Secret (rather than inline env) avoids
rendering the database credentials into the Deployment manifest.
*/ -}}
{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.dsnSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgres.secretKey }}: {{ .Values.postgres.dsn | quote }}
{{- end }}
