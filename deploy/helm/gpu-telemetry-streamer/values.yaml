# Built locally and loaded into minikube (`make minikube-load-streamer`), so we
# must NOT try to pull it from a registry.
image:
  repository: gpu-telemetry-streamer
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Baseline replicas. When autoscaling is enabled the HPA owns the replica count
# and this is only the starting point.
replicaCount: 1

# Horizontal scaling
# Streamers are coordination-free: each replica replays the dataset independently,
# so adding replicas multiplies the telemetry rate. Because every datapoint's
# timestamp is its publish time, replicas produce distinct datapoints, not
# duplicates. The brief caps the fleet at 10 instances.
# Requires metrics-server in the cluster for CPU-based autoscaling.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80   # optional

# Application configuration (injected as env vars; see internal/config)
queue:
  type: "grpc" # "grpc" (custom broker) or "kafka"
  addr: "gpu-telemetry-queue:50051"
  kafka:
    brokers: "kafka:9092"
    topic: "gpu-telemetry"

# Telemetry data source. The CSV lives on a PersistentVolume and is loaded at
# runtime, so it is provisioned independently of the image. Load it onto the
# claim before (or after) install with `make load-streamer-data`; claimName must
# reference a PVC that already exists in the namespace.
csv:
  claimName: gpu-telemetry-streamer-data
  mountPath: /data
  fileName: dcgm_metrics.csv

streamer:
  interval: "10ms"
  loop: true

# Port the streamer serves liveness/readiness/stats on.
healthPort: 8082

# Security (mirrors the collector chart: satisfies the "restricted" PSS)
serviceAccount:
  create: true
  # The streamer does not talk to the Kubernetes API, so never mount a token.
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# TLS for the gRPC queue client. The secret must contain ca.crt signed by the
# same CA used to generate the queue server cert (make gen-tls-certs creates both).
# Leave caSecretName empty to connect without TLS (must match the queue server config).
tls:
  caSecretName: gpu-telemetry-queue-ca

# NetworkPolicies (enforced by Calico):
#  - allow DNS egress
#  - allow egress to Kafka
#  - allow ingress to the health port (kubelet probes arrive from the node)
# Default-deny is provided by the API chart's policy (see networkpolicy.yaml).
networkPolicy:
  enabled: true
  kafkaPort: 9092
  grpcQueuePort: 50051
