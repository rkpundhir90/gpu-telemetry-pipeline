# Values for deploying Bitnami PostgreSQL with TimescaleDB extension
# Credentials and database used by the API (matches POSTGRES_DSN secret)
auth:
  username: telemetry
  password: telemetry
  database: telemetry

# TLS for in-cluster connections. The secret must exist before this chart is
# installed; create it with: make gen-postgres-tls-certs
tls:
  enabled: true
  certificatesSecret: timescaledb-tls
  certFilename: tls.crt
  certKeyFilename: tls.key
  preferServerCiphers: true

# Load timescaledb as a shared_preload_library so the extension can be created
postgresqlSharedPreloadLibraries: "timescaledb"

# Create the extension at init time (runs only on first initialization)
primary:
  initdb:
    scripts:
      create_timescale.sql: |
        -- Create TimescaleDB extension in the telemetry database
        CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
  # Add emptyDir volume for /var/run/postgresql (needed for socket file)
  podSecurityContext:
    enabled: true
    fsGroup: 999
  extraVolumes:
    - name: run
      emptyDir: {}
  extraVolumeMounts:
    - name: run
      mountPath: /var/run/postgresql

# Enable persistence for data
persistence:
  enabled: true
  size: 8Gi

# Disable initdb permissions check
initdbScriptsPermissions:
  enabled: false

# Container security - disable read-only root
containerSecurityContext:
  enabled: true
  runAsUser: 999
  runAsNonRoot: true
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
