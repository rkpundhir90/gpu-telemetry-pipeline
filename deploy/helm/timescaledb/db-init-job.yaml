---
# One-shot Job that creates the telemetry database and enables the TimescaleDB
# extension. Idempotent — safe to re-apply on an already-initialised cluster.
# Uses the telemetry application user (CREATEDB privilege) because the postgres
# superuser password in the Bitnami secret drifts on PVC reuse.
apiVersion: batch/v1
kind: Job
metadata:
  name: timescaledb-db-init
  namespace: gpu-telemetry
  labels:
    app: timescaledb-db-init
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: db-init
          image: timescale/timescaledb:latest-pg15
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PGHOST
              value: "timescaledb-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "telemetry"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescaledb-postgresql
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "==> Checking if database telemetry exists..."
              DB_EXISTS=$(psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='telemetry'")
              if [ "$DB_EXISTS" != "1" ]; then
                echo "==> Creating database telemetry..."
                psql -d postgres -c "CREATE DATABASE telemetry OWNER telemetry;"
              else
                echo "==> Database telemetry already exists, skipping creation."
              fi
              echo "==> Enabling TimescaleDB extension..."
              psql -d telemetry -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
              echo "==> Done."
