{{- if .Values.networkPolicy.enabled }}
# 1) Default-deny is provided by the API chart's policy (podSelector: {} covers
#    every pod in the namespace). This chart adds only the egress/ingress the
#    collector needs. If the collector is installed without the API chart, apply
#    a default-deny policy separately.
# 2) Allow DNS resolution (egress to kube-dns in kube-system).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app.fullname" . }}-allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3) Allow egress to the queue (Kafka or gRPC) and Postgres. Endpoints may be
#    in- or out-of-cluster, so ports are opened to any destination.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app.fullname" . }}-allow-deps
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        {{- if eq .Values.queue.type "grpc" }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.grpcQueuePort }}
        {{- else }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.kafkaPort }}
        {{- end }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgresPort }}
---
# 4) Allow ingress to the health port. Kubelet probes originate from the node, so
#    no "from" selector is set (any source may reach the health port only).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app.fullname" . }}-allow-health
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.healthPort }}
{{- end }}
