apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  {{- /* When the HPA owns scaling, omit replicas so Helm upgrades don't fight it. */}}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "app.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Give in-flight batches time to drain on scale-down / rolling update.
      terminationGracePeriodSeconds: 30
      containers:
        - name: collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: QUEUE_TYPE
              value: {{ .Values.queue.type | quote }}
            - name: QUEUE_ADDR
              value: {{ .Values.queue.addr | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.queue.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.queue.kafka.topic | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.queue.kafka.groupId | quote }}
            - name: COLLECTOR_BATCH_SIZE
              value: {{ .Values.collector.batchSize | quote }}
            - name: COLLECTOR_FLUSH_INTERVAL
              value: {{ .Values.collector.flushInterval | quote }}
            - name: COLLECTOR_FLUSH_TIMEOUT
              value: {{ .Values.collector.flushTimeout | quote }}
            - name: COLLECTOR_HEALTH_ADDR
              value: ":{{ .Values.healthPort }}"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.dsnSecretName" . }}
                  key: {{ .Values.postgres.secretKey }}
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem is true, so give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
