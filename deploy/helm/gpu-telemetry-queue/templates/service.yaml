apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-telemetry-queue.fullname" . }}
  labels:
    {{- include "gpu-telemetry-queue.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "gpu-telemetry-queue.selectorLabels" . | nindent 4 }}
