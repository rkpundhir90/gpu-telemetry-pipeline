apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-telemetry-queue.fullname" . }}
  labels:
    {{- include "gpu-telemetry-queue.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gpu-telemetry-queue.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-telemetry-queue.selectorLabels" . | nindent 8 }}
    spec:
      # Give in-flight RPCs time to drain before the pod is killed.
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: queue
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: QUEUE_LISTEN_ADDR
              value: {{ .Values.env.QUEUE_LISTEN_ADDR | quote }}
            - name: QUEUE_HEALTH_ADDR
              value: ":{{ .Values.healthPort }}"
            - name: QUEUE_MAX_MESSAGES
              value: {{ .Values.maxMessages | quote }}
            {{- if .Values.tls.secretName }}
            - name: GRPC_TLS_CERT_FILE
              value: /tls/tls.crt
            - name: GRPC_TLS_KEY_FILE
              value: /tls/tls.key
            {{- end }}
          ports:
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: {{ .Values.healthPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.tls.secretName }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          {{- end }}
      {{- if .Values.tls.secretName }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
      {{- end }}
