# Default-deny is owned by the API chart. These policies add only what the queue needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gpu-telemetry-queue.fullname" . }}-allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-telemetry-queue.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gpu-telemetry-queue.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gpu-telemetry-queue.fullname" . }}-allow-grpc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-telemetry-queue.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gpu-telemetry-queue.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    - ports:
        - protocol: TCP
          port: {{ .Values.healthPort }}
