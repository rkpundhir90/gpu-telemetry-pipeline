replicaCount: 1

image:
  repository: gpu-telemetry-queue
  tag: 0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50051

env:
  QUEUE_LISTEN_ADDR: ":50051"

# TLS for the gRPC server. The secret must contain tls.crt and tls.key.
# Create it with: make gen-tls-certs
# Leave secretName empty to run without TLS (local dev only).
tls:
  secretName: gpu-telemetry-queue-tls

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
