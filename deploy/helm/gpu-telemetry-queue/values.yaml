replicaCount: 1

image:
  repository: gpu-telemetry-queue
  tag: 0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 50051

env:
  QUEUE_LISTEN_ADDR: ":50051"

# Per-topic buffer cap; oldest quarter evicted when full, lagging consumers reset to new base.
maxMessages: 10000

healthPort: 8083

# gRPC TLS. Secret must contain tls.crt + tls.key. Run 'make gen-tls-certs' to create it.
# Empty = no TLS (local dev only).
tls:
  secretName: gpu-telemetry-queue-tls

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
