# Short-lived helper pod used to copy the telemetry CSV from the local machine
# onto the Streamer's PersistentVolume (`kubectl cp` needs a running container
# that mounts the claim). `make load-streamer-data` applies this, copies the
# file in, then deletes the pod. Its security context satisfies the namespace's
# restricted Pod Security Standard.
apiVersion: v1
kind: Pod
metadata:
  name: streamer-data-loader
  namespace: gpu-telemetry
  labels:
    app.kubernetes.io/part-of: gpu-telemetry-pipeline
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: loader
      image: busybox:1.37
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: gpu-telemetry-streamer-data
